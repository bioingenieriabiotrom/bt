<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Dashboard Producción</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin:20px;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:10px;
font-size:22px;
}

.value{
font-size:40px;
margin-top:10px;
}

canvas{
background:white;
margin-top:40px;
}

</style>

</head>

<body>

<h1>Dashboard Productivo</h1>

<div class="container">

<div class="card">
Producción actual
<div class="value" id="prod"></div>
</div>

<div class="card">
Cumplimiento plan
<div class="value" id="cumpl"></div>
</div>

<div class="card">
No conformes
<div class="value" id="nc"></div>
</div>

<div class="card">
Destrucción
<div class="value" id="dest"></div>
</div>

</div>

<canvas id="grafico"></canvas>

<script>

const sheetID = "PEGAR_ID_DEL_SHEET";
const hoja = "Hoja1";

const url =
`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${hoja}`;

async function cargar(){

const res = await fetch(url);
const text = await res.text();

const json = JSON.parse(text.substring(47).slice(0,-2));

const filas = json.table.rows.map(r => r.c.map(c => c?.v));

console.log(filas);

const meses = filas[0].slice(1);

const prodReal = filas[1].slice(1);
const prodPlan = filas[2].slice(1);
const nc = filas[3].slice(1);
const dest = filas[4].slice(1);

let i = prodReal.length-1;

document.getElementById("prod").innerText = prodReal[i];

document.getElementById("cumpl").innerText =
(prodReal[i]/prodPlan[i]).toFixed(2);

document.getElementById("nc").innerText = nc[i] + "%";

document.getElementById("dest").innerText = dest[i] + "%";

new Chart(document.getElementById("grafico"),{

type:"line",

data:{

labels:meses,

datasets:[
{
label:"Producción real",
data:prodReal
},
{
label:"Producción plan",
data:prodPlan
}
]

}

});

}

cargar();

setInterval(cargar,30000);

</script>

</body>

</html>
